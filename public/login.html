<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Bet - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        /* Additional styles for better UX */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
        
        .btn-loading {
            position: relative;
        }
        
        .btn-loading::after {
            content: "...";
            position: absolute;
            margin-left: 5px;
        }
        
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .success-message {
            color: green;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Welcome to</h1>

        <h1 class="website-name">
            <i class="bi bi-xbox"></i>
            <span class="letter-b">B</span><span class="letter-e">e</span><span class="letter-t">t</span>
        </h1>
        <h2>Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email Address:</label>
                <input type="email" id="username" name="username" placeholder="Enter your email address" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginButton">Login</button>
            <p id="message" class="error-message"></p>
        </form>
        
        <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>
        
        <!-- Optional: Forgot password link -->
        <p class="forgot-password"><a href="#" id="forgotPassword">Forgot Password?</a></p>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyAMU7CywBjtFq6-1ZRoj0M9gL_o6-dIsYY",
            authDomain: "xbet-auth.firebaseapp.com",
            projectId: "xbet-auth",
            storageBucket: "xbet-auth.firebasestorage.app",
            messagingSenderId: "559059319758",
            appId: "1:559059319758:web:70f977770b29748b8d099f",
            measurementId: "G-XDG5WT4ZD2"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Get DOM elements
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.getElementById('loginButton');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('message');
        
        // Clear message when user starts typing
        usernameInput.addEventListener('input', () => {
            messageDiv.textContent = '';
            messageDiv.className = 'error-message';
        });
        
        passwordInput.addEventListener('input', () => {
            messageDiv.textContent = '';
            messageDiv.className = 'error-message';
        });
        
        // Check authentication state on page load
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is signed in
                const loginTime = localStorage.getItem('loginTime');
                const sessionDuration = 24 * 60 * 60 * 1000; // 24 hours
                
                if (loginTime && (Date.now() - parseInt(loginTime)) < sessionDuration) {
                    // Session is still valid, redirect to dashboard
                    window.location.href = '/index.html';
                } else if (user) {
                    // Session expired but user exists in Firebase, refresh session
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', user.email);
                    localStorage.setItem('loginTime', Date.now().toString());
                    
                    // Try to get username from localStorage or use email prefix
                    let username = localStorage.getItem('username');
                    if (!username) {
                        username = user.email.split('@')[0];
                        localStorage.setItem('username', username);
                    }
                    
                    window.location.href = '/index.html';
                }
            }
        });
        
        // Check if user is already logged in (fallback)
        if (localStorage.getItem('isLoggedIn') === 'true') {
            const userEmail = localStorage.getItem('userEmail');
            const loginTime = localStorage.getItem('loginTime');
            const sessionDuration = 24 * 60 * 60 * 1000; // 24 hours
            
            // Check if session is still valid (24 hours)
            if (loginTime && (Date.now() - parseInt(loginTime)) < sessionDuration) {
                // Verify with Firebase
                const currentUser = auth.currentUser;
                if (currentUser && currentUser.email === userEmail) {
                    window.location.href = '/index.html';
                }
            } else {
                // Session expired, clear localStorage
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('username');
                localStorage.removeItem('userPhone');
                localStorage.removeItem('loginTime');
            }
        }
        
        // Login form submission handler with Firebase
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = usernameInput.value.trim();
            const password = passwordInput.value;
            
            // Validation
            if (!email) {
                messageDiv.textContent = 'Please enter your email address';
                messageDiv.className = 'error-message';
                usernameInput.focus();
                return;
            }
            
            if (!password) {
                messageDiv.textContent = 'Please enter your password';
                messageDiv.className = 'error-message';
                passwordInput.focus();
                return;
            }
            
            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                messageDiv.textContent = 'Please enter a valid email address';
                messageDiv.className = 'error-message';
                usernameInput.focus();
                return;
            }
            
            // Disable button and show loading state
            loginButton.disabled = true;
            loginButton.textContent = 'Logging in...';
            loginForm.classList.add('loading');
            messageDiv.textContent = '';
            
            try {
                // Sign in with Firebase
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Get username from localStorage (set during registration) or use email prefix
                let username = localStorage.getItem('username');
                if (!username) {
                    username = email.split('@')[0];
                    localStorage.setItem('username', username);
                }
                
                // Save user data to localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('loginTime', Date.now().toString());
                
                // Show success message
                messageDiv.textContent = 'Login successful! Redirecting...';
                messageDiv.className = 'success-message';
                
                // Redirect to dashboard after short delay
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);
                
            } catch (error) {
                console.error('Firebase Login error:', error);
                
                let errorMessage = 'Login failed. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email. Please register first.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Invalid password. Please try again.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many failed attempts. Please try again later.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'This account has been disabled. Please contact support.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                
                messageDiv.textContent = errorMessage;
                messageDiv.className = 'error-message';
                
                // Clear password field for security
                passwordInput.value = '';
                passwordInput.focus();
                
                // Enable button
                loginButton.disabled = false;
                loginButton.textContent = 'Login';
                loginForm.classList.remove('loading');
            }
        });
        
        // Forgot password handler with Firebase
        document.getElementById('forgotPassword')?.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = usernameInput.value.trim();
            
            if (!email) {
                messageDiv.textContent = 'Please enter your email address to reset password.';
                messageDiv.className = 'error-message';
                usernameInput.focus();
                return;
            }
            
            if (!email.includes('@')) {
                messageDiv.textContent = 'Please enter a valid email address.';
                messageDiv.className = 'error-message';
                usernameInput.focus();
                return;
            }
            
            // Show loading
            messageDiv.textContent = 'Sending password reset email...';
            messageDiv.className = 'success-message';
            loginButton.disabled = true;
            
            try {
                // Send password reset email via Firebase
                await auth.sendPasswordResetEmail(email);
                messageDiv.textContent = `Password reset email sent to ${email}. Check your inbox.`;
                messageDiv.className = 'success-message';
            } catch (error) {
                console.error('Password reset error:', error);
                let errorMessage = 'Failed to send reset email. ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email address.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                messageDiv.textContent = errorMessage;
                messageDiv.className = 'error-message';
            } finally {
                loginButton.disabled = false;
            }
        });
        
        // Press Enter to submit
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
