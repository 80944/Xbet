<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Bet - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        /* Additional styles for better UX */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
        
        .btn-loading {
            position: relative;
        }
        
        .btn-loading::after {
            content: "...";
            position: absolute;
            margin-left: 5px;
        }
        
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .success-message {
            color: green;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Welcome to</h1>

        <h1 class="website-name">
            <i class="bi bi-xbox"></i>
            <span class="letter-b">B</span><span class="letter-e">e</span><span class="letter-t">t</span>
        </h1>
        <h2>Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email Address:</label>
                <input type="email" id="username" name="username" placeholder="Enter your email address" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginButton">Login</button>
            <p id="message" class="error-message"></p>
        </form>
        
        <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>
        
        <!-- Optional: Forgot password link -->
        <p class="forgot-password"><a href="#" id="forgotPassword">Forgot Password?</a></p>
    </div>

    <script>
        // Get DOM elements
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.getElementById('loginButton');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('message');
        
        // Clear message when user starts typing
        usernameInput.addEventListener('input', () => {
            messageDiv.textContent = '';
            messageDiv.className = 'error-message';
        });
        
        passwordInput.addEventListener('input', () => {
            messageDiv.textContent = '';
            messageDiv.className = 'error-message';
        });
        
        // Check if user is already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            const userEmail = localStorage.getItem('userEmail');
            const loginTime = localStorage.getItem('loginTime');
            const sessionDuration = 24 * 60 * 60 * 1000; // 24 hours
            
            // Check if session is still valid (24 hours)
            if (loginTime && (Date.now() - parseInt(loginTime)) < sessionDuration) {
                // Session is still valid, redirect to dashboard
                window.location.href = '/index.html';
            } else {
                // Session expired, clear localStorage
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('username');
                localStorage.removeItem('userPhone');
                localStorage.removeItem('loginTime');
            }
        }
        
        // Login form submission handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = usernameInput.value.trim();
            const password = passwordInput.value;
            
            // Validation
            if (!email) {
                messageDiv.textContent = 'Please enter your email address';
                messageDiv.className = 'error-message';
                usernameInput.focus();
                return;
            }
            
            if (!password) {
                messageDiv.textContent = 'Please enter your password';
                messageDiv.className = 'error-message';
                passwordInput.focus();
                return;
            }
            
            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                messageDiv.textContent = 'Please enter a valid email address';
                messageDiv.className = 'error-message';
                usernameInput.focus();
                return;
            }
            
            // Disable button and show loading state
            loginButton.disabled = true;
            loginButton.textContent = 'Logging in...';
            loginForm.classList.add('loading');
            messageDiv.textContent = '';
            
            try {
                console.log('Attempting login for:', email);
                
                const response = await fetch('/.netlify/functions/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email: email, 
                        password: password
                    })
                });
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (data.success) {
                    // Save user data to localStorage
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('userPhone', data.user.phoneNumber || '');
                    localStorage.setItem('loginTime', Date.now().toString());
                    
                    // Show success message
                    messageDiv.textContent = 'Login successful! Redirecting...';
                    messageDiv.className = 'success-message';
                    
                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1000);
                } else {
                    // Show error message
                    messageDiv.textContent = data.message || 'Login failed. Please check your credentials.';
                    messageDiv.className = 'error-message';
                    
                    // Clear password field for security
                    passwordInput.value = '';
                    passwordInput.focus();
                    
                    // Enable button
                    loginButton.disabled = false;
                    loginButton.textContent = 'Login';
                    loginForm.classList.remove('loading');
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.textContent = 'Network error. Please check your connection and try again.';
                messageDiv.className = 'error-message';
                
                // Enable button
                loginButton.disabled = false;
                loginButton.textContent = 'Login';
                loginForm.classList.remove('loading');
            }
        });
        
        // Forgot password handler (optional - you can implement password reset later)
        document.getElementById('forgotPassword')?.addEventListener('click', (e) => {
            e.preventDefault();
            const email = usernameInput.value.trim();
            if (email && email.includes('@')) {
                messageDiv.textContent = `Password reset link would be sent to ${email}. This feature coming soon!`;
                messageDiv.className = 'success-message';
            } else {
                messageDiv.textContent = 'Please enter your email address to reset password.';
                messageDiv.className = 'error-message';
                usernameInput.focus();
            }
        });
        
        // Optional: Press Enter to submit
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
