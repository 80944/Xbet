    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #101011 0%, #252525 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Responsive Container */
        .register-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: linear-gradient(135deg, #101011 0%, #0b9b58 100%);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* Responsive Headers */
        h1 {
            font-size: 24px;
            text-align: center;
            margin: 0;
            color: #e7f0ea;
        }

        .website-name {
            font-size: 28px;
            text-align: center;
            margin: 5px 0;
            color: #faf1f1;
        }

        h2 {
            font-size: 22px;
            text-align: center;
            margin: 10px 0 20px;
            color: #f3efef;
        }

        /* Form Groups */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ecebeb;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-group input:focus {
            outline: none;
            border-color: #122792;
        }

        /* Responsive Country Code Group */
        .country-code-group {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: center;
        }

        .country-code-group select {
            width: 110px;
            padding: 12px 8px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 8px center;
        }

        .country-code-group input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        /* Mobile: Stack country code and phone input */
        @media (max-width: 480px) {
            .country-code-group {
                flex-direction: column;
                gap: 8px;
            }
            
            .country-code-group select {
                width: 100%;
            }
            
            .country-code-group input {
                width: 100%;
            }
            
            .register-container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .website-name {
                font-size: 24px;
            }
            
            h2 {
                font-size: 20px;
            }
            
            .input-group input {
                font-size: 16px;
                padding: 10px 12px;
            }
            
            button {
                font-size: 16px;
                padding: 12px;
            }
        }

        /* For very small screens */
        @media (max-width: 360px) {
            .register-container {
                padding: 15px 12px;
            }
            
            .help-text {
                font-size: 11px;
            }
        }

        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            display: block;
        }

        select option {
            padding: 10px;
        }

        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .success-message {
            color: green;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .password-strength {
            height: 5px;
            margin-top: 8px;
            border-radius: 3px;
            transition: all 0.3s;
        }
        .strength-weak { width: 33%; background: #ff4444; }
        .strength-medium { width: 66%; background: #ffaa44; }
        .strength-strong { width: 100%; background: #00c851; }

        .terms-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .terms-checkbox input {
            width: 18px;
            height: 18px;
        }

        .terms-checkbox label {
            font-size: 14px;
            flex: 1;
        }

        .register-button {
            width: 100%;
            background: linear-gradient(135deg, #b2b4bd 0%, #101011 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .register-button:hover {
            transform: scale(1.02);
        }

        .login-link, .home-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a, .home-link a {
            color: #09ec68;
            text-decoration: none;
        }

        .login-link a:hover, .home-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

        const confirmHelp = document.getElementById('confirmHelp');
        
        // Password strength indicator
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.className = 'password-strength';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            strengthDiv.className = 'password-strength';
            if (strength <= 2) {
                strengthDiv.classList.add('strength-weak');
            } else if (strength <= 4) {
                strengthDiv.classList.add('strength-medium');
            } else {
                strengthDiv.classList.add('strength-strong');
            }
        });
        
        // Real-time validation
        usernameInput.addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 3) {
                usernameHelp.textContent = 'Username must be at least 3 characters';
                usernameHelp.style.color = 'orange';
            } else if (this.value.length >= 3) {
                usernameHelp.textContent = '✓ Username looks good!';
                usernameHelp.style.color = 'green';
            } else {
                usernameHelp.textContent = '';
            }
        });
        
        emailInput.addEventListener('input', function() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (this.value.length > 0 && !emailRegex.test(this.value)) {
                emailHelp.textContent = 'Please enter a valid email address';
                emailHelp.style.color = 'orange';
            } else if (emailRegex.test(this.value)) {
                emailHelp.textContent = '✓ Email looks good!';
                emailHelp.style.color = 'green';
            } else {
                emailHelp.textContent = '';
            }
        });
        
        confirmInput.addEventListener('input', function() {
            if (this.value.length > 0 && this.value !== passwordInput.value) {
                confirmHelp.textContent = 'Passwords do not match!';
                confirmHelp.style.color = 'red';
            } else if (this.value === passwordInput.value && this.value.length > 0) {
                confirmHelp.textContent = '✓ Passwords match!';
                confirmHelp.style.color = 'green';
            } else {
                confirmHelp.textContent = '';
            }
        });
        
        // Clear message when user starts typing
        const clearMessage = () => {
            messageDiv.textContent = '';
            messageDiv.className = 'error-message';
        };
        
        usernameInput.addEventListener('input', clearMessage);
        emailInput.addEventListener('input', clearMessage);
        phoneInput.addEventListener('input', clearMessage);
        passwordInput.addEventListener('input', clearMessage);
        confirmInput.addEventListener('input', clearMessage);
        termsCheckbox.addEventListener('change', clearMessage);
        
        // Country code patterns for validation
        const countryCodePatterns = {
            '+1': /^\d{10}$/, '+44': /^\d{10}$/, '+254': /^\d{9}$/, '+233': /^\d{9}$/,
            '+234': /^\d{10}$/, '+27': /^\d{9}$/, '+256': /^\d{9}$/, '+255': /^\d{9}$/,
            '+250': /^\d{9}$/, '+91': /^\d{10}$/, '+61': /^\d{9}$/, '+49': /^\d{11}$/,
            '+33': /^\d{9}$/, '+34': /^\d{9}$/, '+39': /^\d{10}$/, '+55': /^\d{11}$/,
            '+52': /^\d{10}$/, '+81': /^\d{10}$/, '+86': /^\d{11}$/, '+971': /^\d{9}$/,
            '+966': /^\d{9}$/, '+20': /^\d{10}$/, '+880': /^\d{10}$/, '+977': /^\d{10}$/,
            '+30': /^\d{10}$/, '+251': /^\d{9}$/, '+41': /^\d{9}$/, '+237': /^\d{9}$/
        };
        
        // Register form submission with Firebase
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const countryCode = countryCodeSelect.value;
            const phoneNumberLocal = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;
            const terms = termsCheckbox.checked;
            
            // Username validation
            if (username.length < 3) {
                messageDiv.textContent = 'Username must be at least 3 characters long';
                messageDiv.className = 'error-message';
                usernameInput.focus();
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                messageDiv.textContent = 'Please enter a valid email address';
                messageDiv.className = 'error-message';
                emailInput.focus();
                return;
            }
            
            // Phone validation (optional)
            let fullPhoneNumber = '';
            if (phoneNumberLocal) {
                const pattern = countryCodePatterns[countryCode] || /^\d{7,15}$/;
                if (!pattern.test(phoneNumberLocal)) {
                    messageDiv.textContent = `Please enter a valid phone number for the selected country`;
                    messageDiv.className = 'error-message';
                    phoneInput.focus();
                    return;
                }
                fullPhoneNumber = `${countryCode}${phoneNumberLocal}`;
            }
            
            // Password validation
            if (password.length < 8) {
                messageDiv.textContent = 'Password must be at least 8 characters long';
                messageDiv.className = 'error-message';
                passwordInput.focus();
                return;
            }
            
            if (password !== confirmPassword) {
                messageDiv.textContent = 'Passwords do not match!';
                messageDiv.className = 'error-message';
                confirmInput.focus();
                return;
            }
            
            if (!terms) {
                messageDiv.textContent = 'You must agree to the Terms and Conditions';
                messageDiv.className = 'error-message';
                termsCheckbox.focus();
                return;
            }
            
            // Disable button and show loading
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating Account...';
            messageDiv.textContent = 'Creating your account... Please wait.';
            messageDiv.className = 'success-message';
            
            try {
                // Create user with Firebase Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Store additional user info in localStorage
                localStorage.setItem('username', username);
                localStorage.setItem('userPhone', fullPhoneNumber);
                localStorage.setItem('userEmail', email);
                localStorage.setItem('isLoggedIn', 'true');
                
                messageDiv.textContent = '✓ Registration successful! Redirecting to dashboard...';
                messageDiv.className = 'success-message';
                
                // Redirect to dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Firebase Registration error:', error);
                
                let errorMessage = 'Registration failed. ';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'An account with this email already exists. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password should be at least 6 characters.';
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'Email/password registration is not enabled. Please contact support.';
                        break;
                    default:
                        errorMessage += error.message;
                }
                
                messageDiv.textContent = errorMessage;
                messageDiv.className = 'error-message';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });
        
        // Remove non-digits as user types - improved for mobile
        phoneInput.addEventListener('input', function(e) {
            // Allow only digits
            this.value = this.value.replace(/[^0-9]/g, '');
        });
        
        // Update placeholder based on selected country
        countryCodeSelect.addEventListener('change', function() {
            const placeholders = {
                '+880': '1712345678', '+977': '9812345678', '+30': '6912345678',
                '+251': '912345678', '+41': '791234567', '+237': '691234567',
                '+254': '712345678', '+1': '5551234567', '+44': '7123456789',
                '+91': '9876543210', '+234': '8012345678', '+27': '712345678',
                '+233': '501234567', '+256': '712345678', '+255': '712345678'
            };
            phoneInput.placeholder = placeholders[this.value] || 'Enter phone number';
        });
        
        // Trigger placeholder update on load
        countryCodeSelect.dispatchEvent(new Event('change'));
    </script>
</body>
</html>
